server:
  host: 0.0.0.0
  port: 8080
  workers: 4
  timeout: 30

database:
  driver: sqlite
  path: ./data/widgets.db
  pool_size: 5

logging:
  level: INFO
  format: "%(asctime)s %(levelname)s %(name)s: %(message)s"
  file: null

webhooks:
  enabled: true
  max_retries: 3
  retry_delay_seconds: 10

pagination:
  default_page_size: 20
  max_page_size: 100
